<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>MouseKey Test</title>
<style>
* { margin: 0; padding: 0; }
body { background: #f0f0f0; padding: 40px; }
input { font-size: 18px; padding: 8px 12px; width: 300px; margin-bottom: 20px; display: block; }
button { font-size: 18px; padding: 10px 30px; cursor: pointer; margin-bottom: 20px; display: block; }
#result { font-size: 24px; font-family: monospace; min-height: 36px; }
</style>
</head>
<body>
<input id="input1" type="text" placeholder="Type here...">
<img id="btn1" src="../imgs/btn_a.png" width="80" height="80" onclick="document.getElementById('result').textContent='CLICKED'" style="cursor:pointer; display:block; margin-bottom:20px; image-rendering:pixelated;">
<div id="result"></div>
</body>
</html>
